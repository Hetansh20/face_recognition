<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard{% endblock %} — InsightFace</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand" style="font-size: 1.25rem; font-weight: 600; color: var(--accent-purple);">
            ⚙️ Admin Panel
        </div>
        <div class="nav-links">
            <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
            <a href="{{ url_for('admin_structure') }}">🏫 Structure</a>
            <a href="{{ url_for('admin_students') }}">🎓 Students</a>
            <a href="{{ url_for('admin_setup') }}">Setup Users</a>
            <a href="{{ url_for('admin_timetables') }}">Timetables</a>
            <a href="{{ url_for('admin_reports') }}">Reports</a>
            <a href="{{ url_for('admin_faces') }}">🎭 Faces</a>
            <a href="{{ url_for('admin_logout') }}" style="color: var(--accent-red); margin-left: 2rem;">Logout</a>
        </div>
    </nav>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
