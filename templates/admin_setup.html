{% extends "admin_base.html" %}
{% block title %}Setup Users{% endblock %}

{% block content %}
<h2>User Setup & Configuration</h2>
<p>Register new faculties and students into the SQLite database. Face Recognition only logs attendance for matching students.</p>

<div class="grid-cards" style="align-items: flex-start;">
    <!-- Add Faculty -->
    <div style="background: var(--bg-card); padding: 2rem; border-radius: var(--radius-md); border: 1px solid var(--border-color);">
        <h3 style="color: var(--accent-green);">👨‍🏫 Add Faculty</h3>
        <div id="fac-alert" class="alert" style="display: none;">
            <span class="alert-msg"></span>
            <button type="button" class="close-btn" onclick="this.parentElement.style.display='none'">&times;</button>
        </div>
        <form id="facForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="f_name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="f_email" required>
            </div>
            <div class="form-group">
                <label>Department</label>
                <input type="text" id="f_dept" required>
            </div>
            <div class="form-group">
                <label>Passcode</label>
                <input type="password" id="f_pass" required>
            </div>
            <button type="submit" class="btn btn-success">Register Faculty</button>
        </form>
    </div>

    <!-- Add Student -->
    <div style="background: var(--bg-card); padding: 2rem; border-radius: var(--radius-md); border: 1px solid var(--border-color);">
        <h3 style="color: var(--accent-blue);">🎓 Add Student</h3>
        <div id="stu-alert" class="alert" style="display: none;">
            <span class="alert-msg"></span>
            <button type="button" class="close-btn" onclick="this.parentElement.style.display='none'">&times;</button>
        </div>
        <form id="stuForm">
            <div class="form-group">
                <label>Student ID (e.g., S001)</label>
                <input type="text" id="s_id" required>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="s_name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="s_email" required>
            </div>
            <div class="form-group">
                <label>Department</label>
                <input type="text" id="s_dept" required>
            </div>
            <button type="submit" class="btn btn-primary">Register Student</button>
        </form>
    </div>
</div>

<script>
async function submitForm(e, endpoint, inputs, alertId) {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.disabled = true;
    
    const body = {};
    inputs.forEach(id => body[id.replace('f_', '').replace('s_', '')] = document.getElementById(id).value);
    
    // map pass -> passcode
    if (body.pass) { body.passcode = body.pass; delete body.pass; }
    // map id -> student_id
    if (body.id) { body.student_id = body.id; delete body.id; }
    // map dept -> department
    if (body.dept) { body.department = body.dept; delete body.dept; }
    
    try {
        const res = await fetch(endpoint, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        const data = await res.json();
        
        const alertEl = document.getElementById(alertId);
        alertEl.style.display = 'block';
        alertEl.querySelector('.alert-msg').textContent = data.message;
        alertEl.className = data.success ? 'alert alert-success' : 'alert alert-error';
        
        if (data.success) e.target.reset();
    } catch (err) {
        console.error(err);
    } finally {
        btn.disabled = false;
    }
}

document.getElementById('facForm').addEventListener('submit', (e) => submitForm(e, '{{ url_for("api_add_faculty") }}', ['f_name', 'f_email', 'f_dept', 'f_pass'], 'fac-alert'));
document.getElementById('stuForm').addEventListener('submit', (e) => submitForm(e, '{{ url_for("api_add_student") }}', ['s_id', 's_name', 's_email', 's_dept'], 'stu-alert'));
</script>
{% endblock %}
